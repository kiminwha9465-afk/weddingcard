<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 모바일 청첩장 제작기</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root{--primary-color:#f8bbd0;--accent-color:#e91e63;}
        *{box-sizing:border-box;}
        body{margin:0;font-family:'Pretendard',sans-serif;background:#f7f8fa;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;box-sizing:border-box;}
        .auth-box{width:100%;max-width:360px;background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,0.06);padding:36px 28px;}
        @media (max-width: 380px) { .auth-box{padding:28px 20px;} }
        .auth-logo{width:44px;height:44px;border-radius:12px;background:var(--accent-color);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 18px;}
        .auth-title{font-size:18px;font-weight:800;text-align:center;margin-bottom:6px;}
        .auth-sub{font-size:12px;color:#999;text-align:center;margin-bottom:24px;}
        .field{margin-bottom:12px;}
        .field input{width:100%;padding:12px 14px;border:1px solid #eee;border-radius:10px;font-size:13px;background:#fafafa;box-sizing:border-box;}
        .field input:focus{outline:none;border-color:var(--primary-color);background:#fff;}
        .auth-submit{width:100%;margin-top:8px;padding:13px;border:none;border-radius:10px;background:var(--accent-color);color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
        .auth-msg{font-size:12px;text-align:center;margin-bottom:14px;padding:10px;border-radius:8px;}
        .auth-msg.error{background:#fff0f4;color:var(--accent-color);}
        .auth-msg.info{background:#f0f7ff;color:#3b82f6;}
        .auth-foot{text-align:center;font-size:12px;color:#999;margin-top:18px;}
        .auth-foot a{color:var(--accent-color);font-weight:700;text-decoration:none;}
        .auth-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:#ddd;font-size:12px;}
        .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:#eee;}
        .kakao-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:none;border-radius:10px;background:#FEE500;color:#3C1E1E;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;box-sizing:border-box;}
        .kakao-btn:hover{background:#f5dc00;}
    </style>
</head>
<body>
    <div class="auth-box">
        <div class="auth-logo"><i class="fa-solid fa-heart"></i></div>
        <div class="auth-title">로그인</div>
        <div class="auth-sub">모바일 청첩장 제작기</div>

        <div th:if="${param.error}" class="auth-msg error">아이디 또는 비밀번호가 올바르지 않습니다.</div>
        <div th:if="${param.registered}" class="auth-msg info">가입이 완료되었습니다. 로그인해주세요.</div>
        <div th:if="${param.logout}" class="auth-msg info">로그아웃되었습니다.</div>

        <form method="post" th:action="@{/login}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="field"><input type="text" name="username" placeholder="아이디" required autofocus></div>
            <div class="field"><input type="password" name="password" placeholder="비밀번호" required></div>
            <button type="submit" class="auth-submit">로그인</button>
        </form>

        <div class="auth-divider">또는</div>
        <a href="/kakao/auth" class="kakao-btn">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M9 1C4.582 1 1 3.896 1 7.455c0 2.267 1.488 4.26 3.747 5.38l-.956 3.57a.178.178 0 0 0 .272.194L8.2 14.1A9.87 9.87 0 0 0 9 14.91c4.418 0 8-2.895 8-6.455C17 3.896 13.418 1 9 1z" fill="#3C1E1E"/></svg>
            카카오로 로그인
        </a>

        <div class="auth-foot">계정이 없으신가요? <a href="/register">회원가입</a></div>
    </div>
</body>
</html>
