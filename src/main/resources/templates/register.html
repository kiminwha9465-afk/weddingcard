<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 모바일 청첩장 제작기</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root{--primary-color:#f8bbd0;--accent-color:#e91e63;}
        *{box-sizing:border-box;}
        body{margin:0;font-family:'Pretendard',sans-serif;background:#f7f8fa;display:flex;align-items:center;justify-content:center;min-height:100vh;}
        .auth-box{width:100%;max-width:360px;background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,0.06);padding:36px 28px;}
        .auth-logo{width:44px;height:44px;border-radius:12px;background:var(--accent-color);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 18px;}
        .auth-title{font-size:18px;font-weight:800;text-align:center;margin-bottom:6px;}
        .auth-sub{font-size:12px;color:#999;text-align:center;margin-bottom:24px;}
        .field{margin-bottom:12px;}
        .field input{width:100%;padding:12px 14px;border:1px solid #eee;border-radius:10px;font-size:13px;background:#fafafa;box-sizing:border-box;}
        .field input:focus{outline:none;border-color:var(--primary-color);background:#fff;}
        .auth-submit{width:100%;margin-top:8px;padding:13px;border:none;border-radius:10px;background:var(--accent-color);color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
        .auth-msg{font-size:12px;text-align:center;margin-bottom:14px;padding:10px;border-radius:8px;background:#fff0f4;color:var(--accent-color);}
        .auth-foot{text-align:center;font-size:12px;color:#999;margin-top:18px;}
        .auth-foot a{color:var(--accent-color);font-weight:700;text-decoration:none;}
    </style>
</head>
<body>
    <div class="auth-box">
        <div class="auth-logo"><i class="fa-solid fa-heart"></i></div>
        <div class="auth-title">회원가입</div>
        <div class="auth-sub">청첩장을 만들고 관리하려면 가입이 필요해요</div>

        <div th:if="${error}" class="auth-msg" th:text="${error}"></div>

        <form method="post" th:action="@{/register}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="field"><input type="email" name="email" placeholder="이메일" th:value="${email}" required autofocus></div>
            <div class="field"><input type="password" name="password" placeholder="비밀번호 (8자 이상)" required minlength="8"></div>
            <div class="field"><input type="password" name="passwordConfirm" placeholder="비밀번호 확인" required minlength="8"></div>
            <button type="submit" class="auth-submit">가입하기</button>
        </form>

        <div class="auth-foot">이미 계정이 있으신가요? <a href="/login">로그인</a></div>
    </div>
</body>
</html>
