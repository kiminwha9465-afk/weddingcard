spring.application.name=weddingcard

# Database — 환경변수가 없으면 로컬 H2, Render에선 PostgreSQL로 교체
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/weddingcard;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 콘솔 — PostgreSQL 사용 시 false로 설정
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}

server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB
server.forward-headers-strategy=framework

kakao.js-key=${KAKAO_JS_KEY:}
kakao.rest-key=${KAKAO_REST_KEY:}

app.admin-username=${ADMIN_USERNAME:admin}
