spring.application.name=weddingcard

spring.datasource.url=jdbc:h2:file:./data/weddingcard;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.h2.console.enabled=true

server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB

kakao.js-key=${KAKAO_JS_KEY:}

app.admin-email=${ADMIN_EMAIL:kiminwha9465@gmail.com}
